<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONIA — Detecção de Fraude</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .table-warning-custom { background-color: #fff9c4 !important; }
        .table-critical-custom { background-color: #ffcdd2 !important; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .progress-thin { height: 6px; }
        .card-stat { border-left: 4px solid; }
        .card-stat.blue { border-left-color: #0d6efd; }
        .card-stat.green { border-left-color: #198754; }
        .card-stat.red { border-left-color: #dc3545; }
        .card-stat.yellow { border-left-color: #ffc107; }
        .photo-thumb { max-width: 200px; max-height: 200px; cursor: pointer; object-fit: cover; }
        .photo-thumb:hover { opacity: 0.8; }
        .justification-img { max-width: 100%; max-height: 80vh; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">🔍 ONIA</a>
            <div class="navbar-nav ms-auto align-items-center">
                {% if session.user %}
                <div class="d-flex align-items-center gap-3" id="progress-widget"></div>
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> {{ session.user.name }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text text-muted small">{{ session.user.email }}</span></li>
                        <li><span class="dropdown-item-text text-muted small">Função: {{ session.user.role }}</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/logout">Sair</a></li>
                    </ul>
                </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-5 pt-3">
        {% block content %}{% endblock %}
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <!-- Goal Reached Modal -->
    <div class="modal fade" id="goalModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header bg-success text-white justify-content-center">
                    <h5 class="modal-title">🎉 200 Aprovações Atingidas! 🎉</h5>
                </div>
                <div class="modal-body">
                    <p class="fs-4">A meta de <strong>200 alunos aprovados</strong> foi alcançada!</p>
                    <p class="text-muted">As revisões podem ser encerradas.</p>
                    <div class="display-1">🏆</div>
                </div>
                <div class="modal-footer justify-content-center">
                    <button class="btn btn-success" data-bs-dismiss="modal">Entendido!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const API = {
        token: localStorage.getItem('access_token'),
        headers() { return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${this.token}`
        };},
        async get(url) {
            const r = await fetch(url, {headers: this.headers()});
            if (r.status === 401) { window.location = '/login'; return; }
            return r.json();
        },
        async post(url, data) {
            const r = await fetch(url, {
                method: 'POST', headers: this.headers(), body: JSON.stringify(data||{})
            });
            if (r.status === 401) { window.location = '/login'; return; }
            return r.json();
        }
    };

    function showToast(msg, type='success') {
        const container = document.getElementById('toastContainer');
        const bg = type === 'error' ? 'bg-danger' : 'bg-success';
        const html = `<div class="toast align-items-center text-white ${bg} border-0" role="alert">
            <div class="d-flex"><div class="toast-body">${msg}</div>
            <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
        container.insertAdjacentHTML('beforeend', html);
        const toast = container.lastElementChild;
        new bootstrap.Toast(toast, {delay: 4000}).show();
        setTimeout(() => toast.remove(), 5000);
    }

    async function loadProgress() {
        try {
            const data = await API.get('/api/dashboard/counter');
            if (!data) return;
            const pct = data.percentage || 0;
            document.getElementById('progress-widget').innerHTML =
                `<div class="d-flex align-items-center gap-2">
                    <span class="text-light small">${data.count}/${data.goal}</span>
                    <div class="progress flex-grow-1 progress-thin" style="width:120px">
                        <div class="progress-bar bg-success" style="width:${Math.min(pct,100)}%"></div>
                    </div>
                    <span class="text-light small">${pct}%</span>
                </div>`;
            if (data.alert && !window._goalShown) {
                window._goalShown = true;
                new bootstrap.Modal(document.getElementById('goalModal')).show();
            }
        } catch(e) {}
    }

    // Load progress bar if logged in
    {% if session.user %}
    loadProgress();
    setInterval(loadProgress, 30000);
    {% endif %}
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
