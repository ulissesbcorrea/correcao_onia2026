<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONIA — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; }
        .login-card { max-width: 400px; width: 100%; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="card shadow login-card">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold">🔍 ONIA</h3>
                <p class="text-muted small">Sistema de Detecção de Fraude<br>Olimpíada Nacional de IA</p>
            </div>
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Email" required>
                    <label>Email</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" placeholder="Senha" required>
                    <label>Senha</label>
                </div>
                <div id="errorMsg" class="alert alert-danger d-none py-2"></div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>
    <script>
    const BASE = window.location.pathname.replace(/\/login$/, '') || '';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const err = document.getElementById('errorMsg');
        try {
            const r = await fetch(BASE + '/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await r.json();
            if (r.ok) {
                localStorage.clear();
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('base_path', BASE);
                window.location = BASE + '/dashboard';
            } else {
                err.textContent = data.error || 'Credenciais inválidas';
                err.classList.remove('d-none');
            }
        } catch(ex) {
            err.textContent = 'Erro de conexão';
            err.classList.remove('d-none');
        }
    });
    </script>
</body>
</html>
